<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>Live Meeting Transcriber</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; width: 300px; padding: 14px; margin: 0; background: #0f1115; color: #eaecef; }
      h1 { font-size: 14px; margin: 0 0 10px; font-weight: 600; }
      .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      label { font-size: 12px; opacity: 0.8; min-width: 64px; }
      input, select { flex: 1; background: #1a1d24; color: #eaecef; border: 1px solid #2a2f3a; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
      button { background: #3454ff; color: #fff; border: 0; border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; flex: 1; }
      button.secondary { background: #2a2f3a; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 10px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; }
      .dot.recording { background: #ef4444; box-shadow: 0 0 8px #ef4444; animation: pulse 1.2s ease-in-out infinite; }
      .dot.error { background: #f59e0b; }
      @keyframes pulse { 50% { opacity: 0.4; } }
      .meta { font-size: 11px; opacity: 0.7; margin-top: 8px; line-height: 1.4; word-break: break-all; }
      .err { color: #f87171; font-size: 11px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>תמלול פגישה חי</h1>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="status-text">לא פעיל</span>
    </div>

    <div class="row">
      <label for="title">כותרת</label>
      <input id="title" type="text" placeholder="(אופציונלי)" />
    </div>
    <div class="row">
      <label for="lang">שפה</label>
      <select id="lang">
        <option value="he" selected>עברית</option>
        <option value="en">English</option>
        <option value="multi">Auto / Multi</option>
      </select>
    </div>

    <div class="row">
      <button id="start">התחל</button>
      <button id="stop" class="secondary" disabled>עצור</button>
    </div>
    <div class="row">
      <button id="toggle" class="secondary">הצג/הסתר כתוביות</button>
    </div>
    <div class="row">
      <button id="mic-permission" class="secondary">אישור מיקרופון</button>
    </div>

    <div class="meta" id="meta"></div>
    <div class="err" id="err"></div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
